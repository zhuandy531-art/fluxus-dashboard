// ==================== SIMULATION ENGINE ====================
function computeSim(trades, N) {
  return trades.map(t => {
    const dir = t.dir === 'long' ? 1 : -1;
    const R = Math.abs(t.ep - t.stop);
    const Q = t.qty;
    const posSize = Q * t.ep;

    // Stop levels
    const stopLevels = [];
    for (let k = 1; k <= N; k++) stopLevels.push(t.ep - (k / N) * R * dir);
    const baseQty = Math.floor(Q / N);
    const quantities = [];
    for (let k = 0; k < N; k++) quantities.push(k < N - 1 ? baseQty : Q - baseQty * (N - 1));

    // Actual P&L
    const actualPL = t.trims.reduce((s, tr) => s + tr.q * (tr.p - t.ep) * dir, 0);
    const actualPLPct = (actualPL / posSize) * 100;

    // Sim P&L
    let simPL;
    if (actualPL >= 0) {
      simPL = actualPL;
    } else {
      // Worst case: all stops triggered
      simPL = 0;
      for (let k = 0; k < N; k++) simPL += quantities[k] * (stopLevels[k] - t.ep) * dir;
    }
    const simPLPct = (simPL / posSize) * 100;

    return {
      ticker: t.ticker, dir: t.dir, entry: t.entry,
      actualPL, simPL, diff: simPL - actualPL,
      actualPLPct, simPLPct,
      diffPct: ((simPL - actualPL) / posSize) * 100,
      posSize,
    };
  });
}

function summarize(rows, label) {
  const totalActual = rows.reduce((s, r) => s + r.actualPL, 0);
  const totalSim = rows.reduce((s, r) => s + r.simPL, 0);
  const losers = rows.filter(r => r.actualPL < 0);
  const simLosers = rows.filter(r => r.simPL < 0);
  const winners = rows.filter(r => r.actualPL > 0);
  const avgWin = winners.length ? winners.reduce((s, r) => s + r.actualPLPct, 0) / winners.length : 0;
  const avgLoss = losers.length ? losers.reduce((s, r) => s + r.actualPLPct, 0) / losers.length : 0;
  const avgSimLoss = simLosers.length ? simLosers.reduce((s, r) => s + r.simPLPct, 0) / simLosers.length : 0;
  const maxLoss = Math.min(...rows.map(r => r.actualPLPct));
  const maxSimLoss = Math.min(...rows.map(r => r.simPLPct));
  return {
    totalActualPct: (totalActual / STARTING_CAPITAL) * 100,
    totalSimPct: (totalSim / STARTING_CAPITAL) * 100,
    diffPct: ((totalSim - totalActual) / STARTING_CAPITAL) * 100,
    winRate: (winners.length / rows.length) * 100,
    winCount: winners.length, lossCount: losers.length, total: rows.length,
    avgWinPct: avgWin, avgLossPct: avgLoss, avgSimLossPct: avgSimLoss,
    maxLossPct: maxLoss, maxSimLossPct: maxSimLoss,
    wlRatio: avgLoss !== 0 ? Math.abs(avgWin / avgLoss) : 0,
    simWlRatio: avgSimLoss !== 0 ? Math.abs(avgWin / avgSimLoss) : 0,
    lossReduction: avgLoss !== 0 ? ((avgSimLoss - avgLoss) / avgLoss) * 100 : 0,
  };
}

// ==================== COMPUTE ====================
const rows2 = computeSim(csvTrades, 2);
const rows3 = computeSim(csvTrades, 3);
const s2 = summarize(rows2, '2-Stop');
const s3 = summarize(rows3, '3-Stop');

let cumActual = 0, cumSim2 = 0, cumSim3 = 0;

  cumSim2 += rows2[t.i].simPL;
  cumSim3 += rows3[t.i].simPL;
  return {

    actual: (cumActual / STARTING_CAPITAL) * 100,
    sim2: (cumSim2 / STARTING_CAPITAL) * 100,
    sim3: (cumSim3 / STARTING_CAPITAL) * 100,
  };
});

// Losers only (actual P&L < 0)
const losers = sorted.filter(t => rows2[t.i].actualPL < 0).map(t => ({
  ticker: t.ticker,
  actual: rows2[t.i].actualPLPct,
  sim2: rows2[t.i].simPLPct,

  <div class="insight-box">

    <p><strong>2. Win/Loss ratio improvement.</strong>

    <br>
    <p><strong>4. Practical consideration.</strong>
    2-stop captures most of the 3-stop benefit with simpler execution (2 tranches vs 3).
    For smaller positions, 2-stop avoids awkward lot sizes from dividing by 3.</p>
    <br>
    <p><strong>5. Compounding over ${csvTrades.length} trades.</strong>
    These savings compound. Over a full year of trading at this pace, reducing avg loss
    by ${Math.abs(s2.avgSimLossPct - s2.avgLossPct).toFixed(2)}\u2013${Math.abs(s3.avgSimLossPct - s3.avgLossPct).toFixed(2)}% per losing trade has significant equity curve impact.</p>
  </div>
`;
